<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test PKM Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Test Upload PKM</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="pkmFile" class="form-label">Pilih File PKM</label>
                            <input type="file" class="form-control" id="pkmFile" accept=".csv,.xlsx,.xls">
                        </div>
                        
                        <button type="button" class="btn btn-primary btn-lg" id="uploadPKMBtn">
                            <i class="fas fa-upload me-2"></i>Upload & Preview
                        </button>
                        
                        <div id="loadingStep" style="display: none;" class="mt-3">
                            <div class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Sedang mengupload...</p>
                            </div>
                        </div>
                        
                        <div id="resultStep" style="display: none;" class="mt-3">
                            <div class="alert alert-info">
                                <h6>Hasil Upload:</h6>
                                <div id="resultMessage"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            const uploadPKMBtn = document.getElementById('uploadPKMBtn');
            const pkmFile = document.getElementById('pkmFile');
            const loadingStep = document.getElementById('loadingStep');
            const resultStep = document.getElementById('resultStep');
            const resultMessage = document.getElementById('resultMessage');
            
            console.log('Elements found:', {
                uploadPKMBtn: uploadPKMBtn,
                pkmFile: pkmFile,
                loadingStep: loadingStep,
                resultStep: resultStep
            });
            
            if (uploadPKMBtn) {
                uploadPKMBtn.addEventListener('click', function() {
                    console.log('Button clicked!');
                    
                    const file = pkmFile.files[0];
                    if (!file) {
                        alert('Silakan pilih file terlebih dahulu');
                        return;
                    }
                    
                    console.log('File selected:', file.name);
                    
                    // Show loading
                    loadingStep.style.display = 'block';
                    resultStep.style.display = 'none';
                    
                    // Simulate upload process
                    setTimeout(function() {
                        loadingStep.style.display = 'none';
                        resultStep.style.display = 'block';
                        resultMessage.innerHTML = `
                            <strong>File:</strong> ${file.name}<br>
                            <strong>Size:</strong> ${file.size} bytes<br>
                            <strong>Type:</strong> ${file.type}<br>
                            <br>
                            <em>Ini adalah test simulasi. Tombol berfungsi dengan baik!</em>
                        `;
                    }, 2000);
                });
                
                console.log('Event listener added successfully');
            } else {
                console.error('Button not found!');
            }
        });
    </script>
</body>
</html>
